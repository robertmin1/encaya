
### Windows functional test configuration for encaya.
### Generated certificates are kept under testdata/windows-runtime/encaya/.

[encaya]

dnsaddress="127.0.0.1"
dnsport="5391"

rootcert="windows-runtime/encaya/root_chain.pem"
rootkey="windows-runtime/encaya/root_key.pem"
listenchain="windows-runtime/encaya/listen_chain.pem"
listenkey="windows-runtime/encaya/listen_key.pem"

[xlog]

severity="debug"

